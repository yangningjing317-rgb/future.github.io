  { name: "银川市", lat: 38.4872, lng: 106.2309, career: "西北新能源与化工基地，重点发展新能源、煤化工、新材料、特色农业，宝丰能源、宁煤等龙头引领，宁东基地产值超2000亿元，葡萄酒、枸杞产业知名。", life: "“塞上湖城”，星海湖等景观优美，生态优良，生活成本低，教育医疗完善。气候干燥、冬冷夏热，昼夜温差大，绿化提升，宜居度高。" },
  { name: "乌鲁木齐市", lat: 43.8256, lng: 87.6168, career: "西北区域中心与开放枢纽，重点发展能源化工、商贸物流、装备制造、文旅，中石油新疆分公司、中泰化学等龙头引领，中欧班列集结中心辐射全球。", life: "城市开阔，民族文化多元，美食有特色，生活成本低，教育医疗充足，交通便捷。气候干燥、冬寒夏热，昼夜温差大，绿化提升，宜居舒适。" },
  { name: "香港特别行政区", lat: 22.3193, lng: 114.1694, imageUrl: "hongkong.jpg", career: "国际金融、贸易、航运中心，重点发展金融服务、专业服务、科创、旅游，港交所、汇丰银行等机构集聚，是人民币国际化枢纽，专业服务与科创产业稳步发展。", life: "国际化都市，商业繁荣，购物与文化资源丰富，教育医疗优质，交通便捷。生活成本高、节奏快，中西文化交融，宜居度高，吸引全球人才。" },

  { name: "泰州市", lat: 32.4847, lng: 119.9231, career: "长三角重要的生物医药与高端装备制造基地，重点发展生物医药及高性能医疗器械、高端装备、船舶与海工装备、精细化工、新能源等产业，医药产业规模与创新能力位居全国地级市前列。同时积极培育电子信息、新材料等新兴产业，产业结构不断优化，制造业实力突出。依托良好的产业基础，吸引了大量相关企业集聚，形成了完善的产业链配套体系。", life: "生活节奏慢，房租友好，配套够用，适合求稳打工和求学。高薪岗位偏少，城市规模不大，发展空间相对有限。" },
  { name: "盐城市", lat: 33.3474, lng: 120.1636, career: "长三角沿海重要的新能源与先进制造业强市，重点发展风电光伏等新能源产业、汽车及零部件、高端装备、海洋经济、电子信息等，风光新能源装机规模全国领先，新能源全产业链优势明显。同时依托沿海滩涂与港口资源，大力发展临港制造、节能环保与现代农业，产业绿色化转型成效显著。积极推动新能源与传统产业融合，培育新兴产业集群，提升产业核心竞争力。", life: "房价低、生活成本小，新能源岗位多，宜居性价比高。地理位置偏沿海，离核心都市圈较远，通勤外出不够方便。" },
  { name: "镇江市", lat: 32.2044, lng: 119.4528, career: "长三角重要的先进制造与新材料产业基地，重点发展高端装备制造、新材料、电子信息、精细化工、航空配套等产业，产业基础扎实、配套体系完善。在高性能材料、精密机械、汽车零部件等领域形成特色优势，同时积极推进数字经济与智能制造融合，制造业质量稳步提升。依托长三角产业协同优势，承接核心城市产业外溢，推动产业向高端化、智能化转型。", life: "靠近南京，高校多适合求学，通勤便利，居住舒适度高。城市经济体量不大，高薪岗位较少，职业上升空间一般。" },
  { name: "芜湖市", lat: 31.3366, lng: 118.3765, career: "皖江城市带核心城市与先进制造业中心，重点发展汽车及零部件、高端装备、电子信息、新材料、人工智能等产业，汽车产业规模与配套能力位居中部前列，新能源汽车发展迅速。同时大力培育航空航天、智能家电、节能环保等新兴产业，工业体系完整，创新能力较强。依托产业园区建设，吸引了大量龙头企业入驻，形成了特色鲜明的产业集群。", life: "房租不高，制造业岗位充足，生活配套成熟，打工宜居度好。城市竞争逐步加大，部分片区交通早晚高峰偏拥堵。" },

  { name: "湖州市", lat: 30.8943, lng: 120.0868, career: "长三角绿色智造与新材料重要基地，重点发展高端装备、新材料、智能家居、纺织服装、绿色家居等产业，坚持绿色低碳发展方向，绿色制造体系完善。同时积极培育数字经济、电子信息、节能环保等新兴产业，民营经济活跃，产业特色鲜明、转型步伐较快。依托太湖资源与长三角区位优势，推动产业协同发展，打造绿色制造示范城市。", life: "离杭州近，环境整洁压力小，适合想在长三角安稳生活。整体薪资水平一般，高端岗位不多，创业机会偏少。" },

  { name: "洛阳市", lat: 34.6186, lng: 112.4536, career: "中原装备制造与文旅城市，重点发展高端装备、有色金属、电子信息与文化旅游等产业。工业基础与历史文旅资源兼备，装备制造实力突出，产业配套较为完善。同时大力发展文旅与新材料，推动传统工业转型，城市产业多元发展。", life: "房价低生活成本小，配套成熟适合安稳生活。高薪岗位不多，产业偏传统，城市发展速度一般。" },
  { name: "徐州市", lat: 34.2044, lng: 117.1848, career: "淮海经济区中心城市，重点发展工程机械、能源化工、装备制造与物流商贸等支柱产业。工程机械产业全国领先，区域辐射能力较强，制造业基础雄厚。同时大力发展现代物流与新兴产业，带动周边区域发展，中心城市功能不断增强。", life: "就业稳定岗位充足，生活成本适中，宜居性价比高。冬季偏冷，城市环境一般，高薪岗位不算多。" },

  { name: "齐齐哈尔市", lat: 47.3543, lng: 123.9182, career: "东北地区重要的装备制造与农业深加工基地，重点发展装备制造、食品加工、冶金、能源及现代农业等支柱产业。工业基础较为扎实，是黑龙江省西北部重要的工业城市与区域中心，在重型机械、粮食加工等领域具备一定优势。同时依托国家商品粮基地优势，大力发展农产品精深加工、绿色食品产业，推动农业与工业深度融合，不断完善区域产业配套体系。", life: "房价房租整体偏低，日常消费亲民，生活压力小，适合求稳打工和学生群体居住。冬季漫长严寒，就业机会偏少，高薪岗位不多，本地年轻人外流现象较为明显。" },
  { name: "锦州市", lat: 41.0951, lng: 121.1270, career: "辽西地区中心城市与重要港口工业城市，重点发展石油化工、装备制造、港口物流、冶金及农产品加工等产业。锦州港区位优势突出，是辽西地区重要交通枢纽与临港工业基地，临港产业与制造业基础较好。同时积极推动传统产业升级改造，培育新材料、新能源等新兴产业，持续优化产业结构，提升区域产业竞争力。", life: "租房成本不高，生活消费适中，制造业岗位相对稳定，适合安稳过日子。城市发展速度一般，高薪岗位偏少，距离核心都市圈较远，对外辐射能力有限。" },
  { name: "潮州市", lat: 23.6701, lng: 116.6323, career: "粤东地区特色轻工与文化旅游城市，重点发展陶瓷、服装、食品加工、电子信息及文化旅游等特色产业。陶瓷、工艺美术等传统产业全国知名，民营经济活跃，形成较为完善的特色轻工产业链。同时依托古城文化与非遗资源大力发展文旅产业，推动文旅与轻工产业协同发展，打造特色鲜明的产业发展格局。", life: "房租便宜、饮食消费低，生活节奏舒缓，打工与生活压力都比较小。高薪岗位偏少，产业整体偏传统，城市规模不大，发展空间相对有限。" },
  { name: "黄冈市", lat: 30.4345, lng: 114.8725, career: "鄂东地区重要制造业与农产品加工基地，重点发展纺织服装、食品加工、建材、电子信息及装备制造等产业。紧邻武汉都市圈，区位优势明显，承接武汉产业外溢与功能疏解效果显著。同时依托农业资源优势发展农产品深加工与现代物流，不断完善产业配套，提升制造业集聚水平。", life: "靠近武汉、房租低廉，生活成本低，适合学生求学与打工过渡。高薪岗位不多，产业整体偏中低端，就业选择与发展空间相对有限。" },

// 初始化 3D 地球地图
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11', 
  projection: 'globe', 
  center: [110, 35], 
  zoom: 2.0, 
  pitch: 0 
});

// 转换为 GeoJSON 格式
const geojsonData = {
  type: 'FeatureCollection',
  features: cities.map(city => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [city.lng, city.lat] },
    properties: {
      name: city.name,
      shortName: city.name.split(' ')[0], 
      career: city.career,
      life: city.life,
      imageUrl: city.imageUrl || null // 动态绑定图片数据
    }
  }))
};

let popup = new mapboxgl.Popup({ closeButton: false, closeOnClick: false, offset: 15 });
const infoPanel = document.getElementById("infoPanel");

// 地图加载完成后，配置深空与数据点
map.on('style.load', () => {
  map.setFog({
    'color': 'rgb(12, 16, 33)', 
    'high-color': '#1e3a8a', 
    'space-color': '#020617', 
    'star-intensity': 0.8 
  });

  map.addLayer({
    'id': '3d-buildings',
    'source': 'composite',
    'source-layer': 'building',
    'filter': ['==', 'extrude', 'true'],
    'type': 'fill-extrusion',
    'minzoom': 14,
    'paint': {
      'fill-extrusion-color': '#1e293b', 
      'fill-extrusion-height': ['get', 'height'],
      'fill-extrusion-base': ['get', 'min_height'],
      'fill-extrusion-opacity': 0.8
    }
  });

  map.addSource('cities-data', {
    type: 'geojson',
    data: geojsonData
  });

  // 呼吸波纹层
  map.addLayer({
    id: 'city-pulse',
    type: 'circle',
    source: 'cities-data',
    paint: {
      'circle-color': '#60a5fa',
      'circle-radius': 4, 
      'circle-opacity': 0.8, 
      'circle-pitch-alignment': 'map' 
    }
  });

  // 实心核心层
  map.addLayer({
    id: 'city-core',
    type: 'circle',
    source: 'cities-data',
    paint: {
      'circle-color': '#93c5fd',
      'circle-radius': 5,
      'circle-stroke-width': 1,
      'circle-stroke-color': '#ffffff',
      'circle-pitch-alignment': 'map'
    }
  });

  // WebGL 动画循环
  let radius = 4;
  let opacity = 0.8;
  function animatePulse() {
    radius += 0.2;
    opacity -= 0.015;
    if (radius > 20) {
      radius = 4;
      opacity = 0.8;
    }
    if (map.getLayer('city-pulse')) {
      map.setPaintProperty('city-pulse', 'circle-radius', radius);
      map.setPaintProperty('city-pulse', 'circle-opacity', Math.max(0, opacity));
    }
    requestAnimationFrame(animatePulse);
  }
  animatePulse(); 
});

// 交互：鼠标悬停
map.on('mouseenter', 'city-core', (e) => {
  map.getCanvas().style.cursor = 'pointer';
  const coordinates = e.features[0].geometry.coordinates.slice();
  const name = e.features[0].properties.shortName;
  popup.setLngLat(coordinates).setHTML(`<b>${name}</b>`).addTo(map);
});

map.on('mouseleave', 'city-core', () => {
  map.getCanvas().style.cursor = '';
  popup.remove();
});

// 交互：点击下钻并显示文字面板
map.on('click', 'city-core', (e) => {
  const props = e.features[0].properties;
  const coords = e.features[0].geometry.coordinates;

  // 填充文字数据
  document.getElementById("cityName").innerText = props.name;
  document.getElementById("careerText").innerText = props.career;
  document.getElementById("lifeText").innerText = props.life;
  
  // 处理动态图片逻辑
  const cityImage = document.getElementById("cityImage");
  if (props.imageUrl && props.imageUrl !== "null") {
    cityImage.src = props.imageUrl;
    cityImage.classList.remove("hidden"); // 显示图片
  } else {
    cityImage.src = "";
    cityImage.classList.add("hidden"); // 没有图片时隐藏
  }
  
  infoPanel.style.transform = "translateX(0)";

  map.flyTo({
    center: coords,
    zoom: 14.5, 
    pitch: 60, 
    bearing: 30, 
    duration: 4000, 
    essential: true
  });
});

// 交互：关闭面板退回宇宙
document.getElementById("closeBtn").addEventListener("click", () => {
  infoPanel.style.transform = "translateX(100%)";

  map.flyTo({
    zoom: 3.0,
    pitch: 0,
    bearing: 0,
    duration: 3000,
    essential: true
  });
});

// 开场平滑引入动画
map.on('load', () => {
  map.flyTo({
    center: [110, 35],
    zoom: 2.5,
    duration: 5000,
    essential: true
  });
});
</script>
